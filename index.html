<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NPTEL Certificate</title>

<style>

body{
    margin:0;
    padding:0;
    background:#202124;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

/* EXTRA DARK PDF ICON */

.pdf-icon{
    width:74px;
    height:74px;
    margin:auto;
    background:#111111;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#8e8e8e;
    font-size:13px;
    font-weight:bold;
    border:1px solid #2e2e2e;
    box-shadow:
    0 0 0 1px #000,
    0 4px 12px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.03);
}

/* CERTIFICATE ID */

.certificate-id{
    color:#d7d7d7;
    font-size:15px;
    margin-top:15px;
    letter-spacing:0.4px;
}

/* OPEN BUTTON */

.open-btn{
    display:inline-block;
    margin-top:14px;
    padding:10px 30px;
    background:#8ab4f8;
    color:#000;
    text-decoration:none;
    border-radius:24px;
    font-size:15px;
    font-weight:bold;
    transition:0.3s;
}

.open-btn:hover{
    background:#a8c7fa;
}

</style>
</head>

<body>

<div class="container">

<div class="pdf-icon">
PDF
</div>

<div class="certificate-id">
NOC26HS54S5539006090383218
</div>

<a 
class="open-btn"
href="NOC26HS54S5539006090383218.pdf"
target="_blank">

Open

</a>

</div>

</body>
