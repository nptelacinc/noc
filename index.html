<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NPTEL Certificate</title>

<style>

:root{
    --bg:#f1f3f4;
    --text:#202124;
    --pdf:#d6d6d6;
    --btn:#1a73e8;
}

@media (prefers-color-scheme: dark){

:root{
    --bg:#202124;
    --text:#e8eaed;
    --pdf:#3a3b3c;
    --btn:#1a73e8;
}

}

body{
    margin:0;
    padding:0;
    background:var(--bg);
    font-family:Arial,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

.container{
    text-align:center;
}

/* REALISTIC PDF ICON */

.pdf-icon{

    width:42px;
    height:50px;

    margin:auto;

    background:var(--pdf);

    border-radius:4px;

    position:relative;

    box-shadow:0 1px 2px rgba(0,0,0,0.08);
}

/* TOP CORNER FOLD */

.pdf-icon::before{

    content:"";

    position:absolute;

    top:0;
    right:0;

    width:10px;
    height:10px;

    background:rgba(255,255,255,0.35);

    clip-path:polygon(0 0,100% 0,100% 100%);
}

/* PDF TEXT */

.pdf-icon::after{

    content:"PDF";

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    color:rgba(255,255,255,0.65);

    font-size:9px;

    font-weight:bold;

    letter-spacing:0.5px;
}

/* FILE NAME */

.filename{

    margin-top:16px;

    color:var(--text);

    font-size:14px;
}

/* BUTTON */

.open-btn{

    display:inline-block;

    margin-top:16px;

    padding:14px 100px;

    background:var(--btn);

    color:white;

    text-decoration:none;

    border-radius:30px;

    font-size:15px;

    font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<div class="pdf-icon"></div>

<div class="filename">
NOC26HS54S5539006090383218.pdf
</div>

<a 
class="open-btn"
href="NOC26HS54S5539006090383218.pdf"
target="_blank">

Open

</a>

</div>

</body>
</html>
