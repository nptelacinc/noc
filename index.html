<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NPTEL Certificate</title>

<style>

body{
    margin:0;
    padding:0;
    background:#202124;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

/* DARK PDF ICON */

.pdf-icon{
    width:72px;
    height:72px;
    margin:auto;
    background:#2b2b2b;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#d9d9d9;
    font-size:14px;
    font-weight:bold;
    border:1px solid #444;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

/* CERTIFICATE ID */

.certificate-id{
    color:#dcdcdc;
    font-size:15px;
    margin-top:16px;
    letter-spacing:0.5px;
}

/* OPEN BUTTON */

.open-btn{
    display:inline-block;
    margin-top:14px;
    padding:10px 28px;
    background:#8ab4f8;
    color:#000;
    text-decoration:none;
    border-radius:25px;
    font-size:15px;
    font-weight:bold;
    transition:0.3s;
}

.open-btn:hover{
    background:#a8c7fa;
}

</style>
</head>

<body>

<div class="container">

<div class="pdf-icon">
PDF
</div>

<div class="certificate-id">
NOC26HS54S5539006090383218
</div>

<a 
class="open-btn"
href="NOC26HS54S5539006090383218.pdf"
target="_blank">

Open

</a>

</div>

</body>
</html>
