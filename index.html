<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NPTEL Certificate</title>

<style>

:root{
    --bg:#f1f3f4;
    --text:#202124;
    --btn:#1a73e8;
}

@media (prefers-color-scheme: dark){

:root{
    --bg:#202124;
    --text:#e8eaed;
}

}

body{
    margin:0;
    padding:0;
    background:var(--bg);

    font-family:Arial,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

.container{
    text-align:center;
}

/* EXACT LIGHT PDF ICON */

.pdf-icon{

    width:54px;
    height:54px;

    margin:auto;

    border-radius:8px;

    background:#d9d9d9;

    display:flex;
    align-items:center;
    justify-content:center;

    color:#f5f5f5;

    font-size:18px;
    font-weight:bold;

    letter-spacing:1px;
}

/* FILE NAME */

.filename{

    margin-top:18px;

    color:var(--text);

    font-size:14px;
}

/* BUTTON */

.open-btn{

    display:inline-block;

    margin-top:16px;

    padding:14px 105px;

    border-radius:30px;

    background:#1a73e8;

    color:white;

    text-decoration:none;

    font-size:15px;

    font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<div class="pdf-icon">
PDF
</div>

<div class="filename">
NOC26HS54S5539006090383218.pdf
</div>

<a 
class="open-btn"
href="NOC26HS54S5539006090383218.pdf"
target="_blank">

Open

</a>

</div>

</body>
</html>
