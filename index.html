<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPTEL Certificate Verification</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f2f5f9;
    font-family:Arial, Helvetica, sans-serif;
}

.topbar{
    background:#7a0019;
    color:white;
    padding:18px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    letter-spacing:1px;
}

.container{
    width:90%;
    max-width:1100px;
    margin:40px auto;
    background:white;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
    overflow:hidden;
}

.header{
    background:#b5121b;
    color:white;
    padding:20px;
    text-align:center;
}

.header h1{
    margin:0;
    font-size:32px;
}

.verify-box{
    padding:30px;
    text-align:center;
}

.verify-box h2{
    color:#222;
    margin-bottom:10px;
}

.verify-box p{
    color:#666;
    font-size:18px;
}

.certificate{
    width:95%;
    height:700px;
    border:none;
    margin:20px auto;
    display:block;
}

.footer{
    background:#111;
    color:#bbb;
    text-align:center;
    padding:15px;
    font-size:14px;
}

.badge{
    display:inline-block;
    padding:8px 18px;
    background:#0a8f08;
    color:white;
    border-radius:30px;
    margin-top:15px;
    font-weight:bold;
}

.code{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#b5121b;
}
</style>

</head>
<body>

<div class="topbar">
NPTEL ONLINE CERTIFICATION
</div>

<div class="container">

<div class="header">
<h1>Certificate Verification</h1>
</div>

<div class="verify-box">

<h2>Successfully Verified</h2>

<p>
The following certificate has been verified successfully from the NPTEL database.
</p>

<div class="badge">
Verified Certificate
</div>

<div class="code">
NOC26HS54S5539006090383218
</div>

</div>

<!-- PDF VIEW -->

<iframe 
class="certificate"
src="NOC26HS54S5539006090383218.pdf">
</iframe>

<div class="footer">
© NPTEL Online Certification Course
</div>

</div>

</body>
</html>
