<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NPTEL Certificate</title>

<style>

:root{
    --bg:#ffffff;
    --text:#111111;
    --box:#f3f3f3;
    --border:#dcdcdc;
    --button:#8ab4f8;
}

@media (prefers-color-scheme: dark){

:root{
    --bg:#202124;
    --text:#dcdcdc;
    --box:#2a2a2a;
    --border:#333333;
    --button:#8ab4f8;
}

}

body{
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    transition:0.3s;
}

.container{
    text-align:center;
}

/* PDF ICON */

.pdf-icon{
    width:58px;
    height:58px;
    margin:auto;
    border-radius:8px;
    background:var(--box);
    border:1px solid var(--border);

    display:flex;
    align-items:center;
    justify-content:center;

    color:#666;
    font-size:11px;
    font-weight:bold;
}

/* CERTIFICATE NUMBER */

.certificate-id{
    margin-top:14px;
    font-size:14px;
    color:var(--text);
}

/* OPEN BUTTON */

.open-btn{
    display:inline-block;
    margin-top:12px;
    padding:8px 24px;
    border-radius:20px;
    background:var(--button);
    color:#111;
    text-decoration:none;
    font-size:14px;
    font-weight:500;
}

</style>
</head>

<body>

<div class="container">

<div class="pdf-icon">
PDF
</div>

<div class="certificate-id">
NOC26HS54S5539006090383218.pdf
</div>

<a 
class="open-btn"
href="NOC26HS54S5539006090383218.pdf"
target="_blank">

Open

</a>

</div>

</body>
</html>
