<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NPTEL Certificate</title>

<style>

body{
    margin:0;
    padding:0;
    background:#202124;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

/* NPTEL STYLE DARK PDF ICON */

.pdf-icon{
    width:58px;
    height:58px;
    margin:auto;
    background:#2a2a2a;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#3b3b3b;
    font-size:11px;
    font-weight:bold;
    border:1px solid #323232;
}

/* CERTIFICATE NUMBER */

.certificate-id{
    color:#cfcfcf;
    font-size:14px;
    margin-top:14px;
    letter-spacing:0.3px;
}

/* OPEN BUTTON */

.open-btn{
    display:inline-block;
    margin-top:12px;
    padding:8px 24px;
    background:#8ab4f8;
    color:#111;
    text-decoration:none;
    border-radius:20px;
    font-size:14px;
    font-weight:500;
}

</style>
</head>

<body>

<div class="container">

<div class="pdf-icon">
PDF
</div>

<div class="certificate-id">
NOC26HS54S5539006090383218.pdf
</div>

<a 
class="open-btn"
href="NOC26HS54S5539006090383218.pdf"
target="_blank">

Open

</a>

</div>

</body>
</html>
